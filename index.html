<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #111827);
        color: #f8fafc;
      }

      .game-shell {
        width: min(92vw, 460px);
        padding: 1.25rem;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.95);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      .hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.8rem;
        flex-wrap: wrap;
      }

      .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-bottom: 0.8rem;
        color: #cbd5e1;
        font-size: 0.95rem;
      }

      select {
        border: 1px solid #64748b;
        border-radius: 8px;
        padding: 0.35rem 0.6rem;
        background: #111827;
        color: #f8fafc;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.6rem 1rem;
        font-size: 0.95rem;
        cursor: pointer;
        background: #22c55e;
        color: white;
      }

      button:hover {
        background: #16a34a;
      }

      canvas {
        width: 100%;
        max-width: 400px;
        aspect-ratio: 1;
        border: 4px solid #e2e8f0;
        border-radius: 12px;
        background: #1f2937;
      }

      .instructions {
        margin: 0.8rem 0 0;
        color: #cbd5e1;
        font-size: 0.95rem;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 6, 23, 0.82);
        display: grid;
        place-items: center;
        z-index: 10;
      }

      .overlay.hidden {
        display: none;
      }

      .overlay-card {
        width: min(90vw, 360px);
        padding: 1.4rem;
        border-radius: 18px;
        background: #111827;
        border: 1px solid #334155;
        text-align: center;
      }

      .overlay-card h2 {
        margin-top: 0;
      }

      .touch-controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
        max-width: 220px;
        margin: 0.8rem auto 0;
      }

      .touch-controls button {
        padding: 0.7rem;
        border-radius: 10px;
      }

      .touch-controls .up {
        grid-column: 2;
      }

      .touch-controls .left {
        grid-column: 1;
      }

      .touch-controls .right {
        grid-column: 3;
      }

      .touch-controls .down {
        grid-column: 2;
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <h1>Snake Game</h1>
      <div class="hud">
        <p>Score: <span id="score">0</span></p>
        <p>Lives: <span id="lives">3</span></p>
        <p>High Score: <span id="highScore">0</span></p>
        <button id="restartButton" type="button">Restart</button>
      </div>
      <div class="controls">
        <label for="modeSelect">Mode</label>
        <select id="modeSelect">
          <option value="classic">Classic</option>
          <option value="barrier">Barrier</option>
          <option value="tunnel">Tunnel</option>
        </select>
        <label for="difficultySelect">Difficulty</label>
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="touch-controls">
        <button class="up" data-direction="ArrowUp" type="button">▲</button>
        <button class="left" data-direction="ArrowLeft" type="button">◀</button>
        <button class="right" data-direction="ArrowRight" type="button">▶</button>
        <button class="down" data-direction="ArrowDown" type="button">▼</button>
      </div>
      <p class="instructions">Choose a mode and difficulty, then use the arrow keys to move. A red heart appears every 25 seconds for 5 seconds to grant an extra life.</p>
    </main>

    <div id="overlay" class="overlay">
      <div class="overlay-card">
        <h2 id="overlayTitle">Snake Game</h2>
        <p id="overlayMessage">Press Start to begin your adventure.</p>
        <button id="overlayButton" type="button">Start Game</button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const livesEl = document.getElementById('lives');
      const highScoreEl = document.getElementById('highScore');
      const restartButton = document.getElementById('restartButton');
      const modeSelect = document.getElementById('modeSelect');
      const difficultySelect = document.getElementById('difficultySelect');
      const overlay = document.getElementById('overlay');
      const overlayTitle = document.getElementById('overlayTitle');
      const overlayMessage = document.getElementById('overlayMessage');
      const overlayButton = document.getElementById('overlayButton');
      const touchButtons = document.querySelectorAll('.touch-controls button');

      const tileSize = 20;
      const boardSize = canvas.width / tileSize;
      const heartSpawnInterval = 25000;
      const heartVisibleDuration = 5000;
      let snake = [];
      let direction = { x: 1, y: 0 };
      let nextDirection = { x: 1, y: 0 };
      let food = { x: 0, y: 0 };
      let walls = [];
      let score = 0;
      let lives = 3;
      let running = false;
      let paused = false;
      let gameLoop = null;
      let heart = null;
      let heartTimer = 0;
      let heartVisibleUntil = 0;
      let gameStarted = false;
      let gameSpeedMs = 140;
      let highScore = Number(localStorage.getItem('snakeHighScore') || 0);
      highScoreEl.textContent = highScore.toString();

      function getWallsForModeAndDifficulty() {
        const mode = modeSelect.value;
        const difficulty = difficultySelect.value;

        if (mode === 'classic') {
          return [];
        }

        if (mode === 'barrier') {
          switch (difficulty) {
            case 'medium':
              return [
                { x: 9, y: 5 }, { x: 9, y: 6 }, { x: 9, y: 7 }, { x: 9, y: 8 },
                { x: 10, y: 5 }, { x: 10, y: 6 }, { x: 10, y: 7 }, { x: 10, y: 8 }
              ];
            case 'hard':
              return [
                { x: 6, y: 4 }, { x: 6, y: 5 }, { x: 6, y: 6 }, { x: 6, y: 7 }, { x: 6, y: 8 },
                { x: 13, y: 4 }, { x: 13, y: 5 }, { x: 13, y: 6 }, { x: 13, y: 7 }, { x: 13, y: 8 },
                { x: 8, y: 12 }, { x: 9, y: 12 }, { x: 10, y: 12 }, { x: 11, y: 12 }, { x: 12, y: 12 }
              ];
            default:
              return [];
          }
        }

        if (mode === 'tunnel') {
          const walls = [];
          const tunnelOffset = difficulty === 'hard' ? 3 : difficulty === 'medium' ? 4 : 5;

          for (let x = 0; x < boardSize; x += 1) {
            for (let y = 0; y < boardSize; y += 1) {
              const isOuterWall =
                (x === tunnelOffset && y >= tunnelOffset && y <= boardSize - tunnelOffset - 1) ||
                (x === boardSize - tunnelOffset - 1 && y >= tunnelOffset && y <= boardSize - tunnelOffset - 1) ||
                (y === tunnelOffset && x >= tunnelOffset && x <= boardSize - tunnelOffset - 1) ||
                (y === boardSize - tunnelOffset - 1 && x >= tunnelOffset && x <= boardSize - tunnelOffset - 1);

              const isInnerBlock =
                difficulty === 'hard' &&
                ((x === 10 && y >= 6 && y <= 12) || (y === 10 && x >= 6 && x <= 14));

              if (isOuterWall || isInnerBlock) {
                walls.push({ x, y });
              }
            }
          }

          if (difficulty === 'medium') {
            for (let y = 6; y <= 12; y += 1) {
              walls.push({ x: 10, y });
            }
          }

          if (difficulty === 'hard') {
            for (let x = 6; x <= 13; x += 1) {
              walls.push({ x, y: 10 });
            }
          }

          return walls;
        }

        return [];
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('snakeHighScore', highScore.toString());
          highScoreEl.textContent = highScore.toString();
        }
      }

      function updateSpeed() {
        gameSpeedMs = Math.max(70, 140 - score * 4);
        if (gameLoop) {
          clearInterval(gameLoop);
        }
        gameLoop = setInterval(loop, gameSpeedMs);
      }

      function showOverlay(title, message, buttonText) {
        overlayTitle.textContent = title;
        overlayMessage.textContent = message;
        overlayButton.textContent = buttonText;
        overlay.classList.remove('hidden');
      }

      function hideOverlay() {
        overlay.classList.add('hidden');
      }

      function resetGame() {
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        walls = getWallsForModeAndDifficulty();
        score = 0;
        lives = 3;
        scoreEl.textContent = '0';
        livesEl.textContent = lives.toString();
        running = true;
        paused = false;
        gameStarted = true;
        heart = null;
        heartTimer = 0;
        heartVisibleUntil = 0;
        placeFood();
        updateSpeed();
        hideOverlay();
      }

      function placeFood() {
        let position;
        do {
          position = {
            x: Math.floor(Math.random() * boardSize),
            y: Math.floor(Math.random() * boardSize)
          };
        } while (
          snake.some((segment) => segment.x === position.x && segment.y === position.y) ||
          walls.some((wall) => wall.x === position.x && wall.y === position.y)
        );

        food = position;
      }

      function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#1f2937';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#374151';
        ctx.lineWidth = 1;
        for (let i = 0; i <= boardSize; i += 1) {
          ctx.beginPath();
          ctx.moveTo(i * tileSize, 0);
          ctx.lineTo(i * tileSize, canvas.height);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, i * tileSize);
          ctx.lineTo(canvas.width, i * tileSize);
          ctx.stroke();
        }
      }

      function drawWalls() {
        walls.forEach((wall) => {
          ctx.fillStyle = '#64748b';
          ctx.fillRect(wall.x * tileSize, wall.y * tileSize, tileSize - 1, tileSize - 1);
        });
      }

      function drawSnake() {
        snake.forEach((segment, index) => {
          ctx.fillStyle = index === 0 ? '#22c55e' : '#4ade80';
          ctx.fillRect(segment.x * tileSize, segment.y * tileSize, tileSize - 1, tileSize - 1);
        });
      }

      function drawFood() {
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.arc(food.x * tileSize + tileSize / 2, food.y * tileSize + tileSize / 2, tileSize / 2.2, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawHeart() {
        if (!heart) {
          return;
        }

        const x = heart.x * tileSize + tileSize / 2;
        const y = heart.y * tileSize + tileSize / 2;
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.moveTo(x, y + 4);
        ctx.bezierCurveTo(x, y - 2, x - 6, y - 2, x - 6, y + 4);
        ctx.bezierCurveTo(x - 6, y + 10, x - 2, y + 14, x, y + 18);
        ctx.bezierCurveTo(x + 2, y + 14, x + 6, y + 10, x + 6, y + 4);
        ctx.bezierCurveTo(x + 6, y - 2, x, y - 2, x, y + 4);
        ctx.fill();
      }

      function updateHeart() {
        const now = Date.now();
        if (heartTimer === 0) {
          heartTimer = now;
        }

        if (now - heartTimer >= heartSpawnInterval) {
          heartTimer = now;
          heartVisibleUntil = now + heartVisibleDuration;
          let position;
          do {
            position = {
              x: Math.floor(Math.random() * boardSize),
              y: Math.floor(Math.random() * boardSize)
            };
          } while (
            snake.some((segment) => segment.x === position.x && segment.y === position.y) ||
            walls.some((wall) => wall.x === position.x && wall.y === position.y) ||
            (food.x === position.x && food.y === position.y)
          );
          heart = position;
        }

        if (heart && now >= heartVisibleUntil) {
          heart = null;
        }
      }

      function endGame() {
        updateHighScore();
        running = false;
        gameStarted = false;
        showOverlay('Game Over', `You scored ${score} points. Press Restart or Start to play again.`, 'Play Again');
      }

      function togglePause() {
        if (!gameStarted || !running) {
          return;
        }
        paused = !paused;
        if (paused) {
          showOverlay('Paused', 'Press Resume or P to continue.', 'Resume');
        } else {
          hideOverlay();
        }
      }

      function update() {
        if (!running || paused) {
          return;
        }

        updateHeart();

        direction = nextDirection;
        const head = { ...snake[0] };
        head.x += direction.x;
        head.y += direction.y;

        const isEating = head.x === food.x && head.y === food.y;
        const isGettingHeart = heart && head.x === heart.x && head.y === heart.y;
        const collisionCheck = isEating ? snake : snake.slice(0, -1);

        if (
          head.x < 0 ||
          head.y < 0 ||
          head.x >= boardSize ||
          head.y >= boardSize ||
          walls.some((wall) => wall.x === head.x && wall.y === head.y) ||
          collisionCheck.some((segment) => segment.x === head.x && segment.y === head.y)
        ) {
          lives -= 1;
          livesEl.textContent = lives.toString();

          if (lives > 0) {
            snake = [
              { x: 10, y: 10 },
              { x: 9, y: 10 },
              { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            placeFood();
            return;
          }

          endGame();
          return;
        }

        snake.unshift(head);

        if (isGettingHeart) {
          heart = null;
          lives += 1;
          livesEl.textContent = lives.toString();
        }

        if (isEating) {
          score += 1;
          scoreEl.textContent = score.toString();
          updateSpeed();
          placeFood();
        } else {
          snake.pop();
        }
      }

      function render() {
        drawBoard();
        drawWalls();
        drawFood();
        drawHeart();
        drawSnake();
      }

      function loop() {
        update();
        render();
      }

      function setDirection(x, y) {
        if (x === -direction.x && y === -direction.y) {
          return;
        }
        nextDirection = { x, y };
      }

      document.addEventListener('keydown', (event) => {
        if (event.key === 'p' || event.key === 'P') {
          event.preventDefault();
          togglePause();
          return;
        }

        if (!gameStarted && event.key === 'Enter') {
          event.preventDefault();
          resetGame();
          return;
        }

        switch (event.key) {
          case 'ArrowUp':
            event.preventDefault();
            setDirection(0, -1);
            break;
          case 'ArrowDown':
            event.preventDefault();
            setDirection(0, 1);
            break;
          case 'ArrowLeft':
            event.preventDefault();
            setDirection(-1, 0);
            break;
          case 'ArrowRight':
            event.preventDefault();
            setDirection(1, 0);
            break;
          default:
            break;
        }
      });

      restartButton.addEventListener('click', () => {
        resetGame();
      });

      overlayButton.addEventListener('click', () => {
        if (paused) {
          paused = false;
          hideOverlay();
        } else {
          resetGame();
        }
      });

      modeSelect.addEventListener('change', () => {
        if (gameStarted) {
          resetGame();
        }
      });

      difficultySelect.addEventListener('change', () => {
        if (gameStarted) {
          resetGame();
        }
      });

      touchButtons.forEach((button) => {
        button.addEventListener('click', () => {
          const directionKey = button.getAttribute('data-direction');
          switch (directionKey) {
            case 'ArrowUp':
              setDirection(0, -1);
              break;
            case 'ArrowDown':
              setDirection(0, 1);
              break;
            case 'ArrowLeft':
              setDirection(-1, 0);
              break;
            case 'ArrowRight':
              setDirection(1, 0);
              break;
          }
        });
      });

      showOverlay('Snake Game', 'Press Start to begin your adventure.', 'Start Game');
    </script>
  </body>
</html>
