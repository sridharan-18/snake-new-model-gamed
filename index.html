<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #111827);
        color: #f8fafc;
      }

      .game-shell {
        width: min(92vw, 460px);
        padding: 1.25rem;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.95);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      .hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.8rem;
      }

      .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.6rem;
        margin-bottom: 0.8rem;
        color: #cbd5e1;
        font-size: 0.95rem;
      }

      select {
        border: 1px solid #64748b;
        border-radius: 8px;
        padding: 0.35rem 0.6rem;
        background: #111827;
        color: #f8fafc;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 0.6rem 1rem;
        font-size: 0.95rem;
        cursor: pointer;
        background: #22c55e;
        color: white;
      }

      button:hover {
        background: #16a34a;
      }

      canvas {
        width: 100%;
        max-width: 400px;
        aspect-ratio: 1;
        border: 4px solid #e2e8f0;
        border-radius: 12px;
        background: #1f2937;
      }

      .instructions {
        margin: 0.8rem 0 0;
        color: #cbd5e1;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="game-shell">
      <h1>Snake Game</h1>
      <div class="hud">
        <p>Score: <span id="score">0</span></p>
        <p>Lives: <span id="lives">3</span></p>
        <button id="restartButton" type="button">Restart</button>
      </div>
      <div class="controls">
        <label for="modeSelect">Mode</label>
        <select id="modeSelect">
          <option value="classic">Classic</option>
          <option value="barrier">Barrier</option>
          <option value="tunnel">Tunnel</option>
        </select>
        <label for="difficultySelect">Difficulty</label>
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <p class="instructions">Choose a mode and difficulty, then use the arrow keys to move. You have 3 lives and can revive after a collision.</p>
    </main>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const livesEl = document.getElementById('lives');
      const restartButton = document.getElementById('restartButton');
      const modeSelect = document.getElementById('modeSelect');
      const difficultySelect = document.getElementById('difficultySelect');

      const tileSize = 20;
      const boardSize = canvas.width / tileSize;
      let snake = [];
      let direction = { x: 1, y: 0 };
      let nextDirection = { x: 1, y: 0 };
      let food = { x: 0, y: 0 };
      let walls = [];
      let score = 0;
      let lives = 3;
      let running = true;
      let gameLoop = null;

      function getWallsForModeAndDifficulty() {
        const mode = modeSelect.value;
        const difficulty = difficultySelect.value;

        if (mode === 'classic') {
          return [];
        }

        if (mode === 'barrier') {
          switch (difficulty) {
            case 'medium':
              return [
                { x: 9, y: 5 }, { x: 9, y: 6 }, { x: 9, y: 7 }, { x: 9, y: 8 },
                { x: 10, y: 5 }, { x: 10, y: 6 }, { x: 10, y: 7 }, { x: 10, y: 8 }
              ];
            case 'hard':
              return [
                { x: 6, y: 4 }, { x: 6, y: 5 }, { x: 6, y: 6 }, { x: 6, y: 7 }, { x: 6, y: 8 },
                { x: 13, y: 4 }, { x: 13, y: 5 }, { x: 13, y: 6 }, { x: 13, y: 7 }, { x: 13, y: 8 },
                { x: 8, y: 12 }, { x: 9, y: 12 }, { x: 10, y: 12 }, { x: 11, y: 12 }, { x: 12, y: 12 }
              ];
            default:
              return [];
          }
        }

        if (mode === 'tunnel') {
          const walls = [];
          const tunnelOffset = difficulty === 'hard' ? 3 : difficulty === 'medium' ? 4 : 5;
          const innerOffset = difficulty === 'hard' ? 1 : difficulty === 'medium' ? 2 : 3;

          for (let x = 0; x < boardSize; x += 1) {
            for (let y = 0; y < boardSize; y += 1) {
              const isOuterWall =
                (x === tunnelOffset && y >= tunnelOffset && y <= boardSize - tunnelOffset - 1) ||
                (x === boardSize - tunnelOffset - 1 && y >= tunnelOffset && y <= boardSize - tunnelOffset - 1) ||
                (y === tunnelOffset && x >= tunnelOffset && x <= boardSize - tunnelOffset - 1) ||
                (y === boardSize - tunnelOffset - 1 && x >= tunnelOffset && x <= boardSize - tunnelOffset - 1);

              const isInnerBlock =
                difficulty === 'hard' &&
                ((x === 10 && y >= 6 && y <= 12) || (y === 10 && x >= 6 && x <= 14));

              if (isOuterWall || isInnerBlock) {
                walls.push({ x, y });
              }
            }
          }

          if (difficulty === 'medium') {
            for (let y = 6; y <= 12; y += 1) {
              walls.push({ x: 10, y });
            }
          }

          if (difficulty === 'hard') {
            for (let x = 6; x <= 13; x += 1) {
              walls.push({ x, y: 10 });
            }
          }

          return walls;
        }

        return [];
      }

      function resetGame() {
        snake = [
          { x: 10, y: 10 },
          { x: 9, y: 10 },
          { x: 8, y: 10 }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        walls = getWallsForModeAndDifficulty();
        score = 0;
        lives = 3;
        scoreEl.textContent = '0';
        livesEl.textContent = lives.toString();
        running = true;
        placeFood();
        if (gameLoop) {
          cancelAnimationFrame(gameLoop);
        }
        gameLoop = requestAnimationFrame(loop);
      }

      function placeFood() {
        let position;
        do {
          position = {
            x: Math.floor(Math.random() * boardSize),
            y: Math.floor(Math.random() * boardSize)
          };
        } while (
          snake.some((segment) => segment.x === position.x && segment.y === position.y) ||
          walls.some((wall) => wall.x === position.x && wall.y === position.y)
        );

        food = position;
      }

      function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#1f2937';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#374151';
        ctx.lineWidth = 1;
        for (let i = 0; i <= boardSize; i += 1) {
          ctx.beginPath();
          ctx.moveTo(i * tileSize, 0);
          ctx.lineTo(i * tileSize, canvas.height);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, i * tileSize);
          ctx.lineTo(canvas.width, i * tileSize);
          ctx.stroke();
        }
      }

      function drawWalls() {
        walls.forEach((wall) => {
          ctx.fillStyle = '#64748b';
          ctx.fillRect(wall.x * tileSize, wall.y * tileSize, tileSize - 1, tileSize - 1);
        });
      }

      function drawSnake() {
        snake.forEach((segment, index) => {
          ctx.fillStyle = index === 0 ? '#22c55e' : '#4ade80';
          ctx.fillRect(segment.x * tileSize, segment.y * tileSize, tileSize - 1, tileSize - 1);
        });
      }

      function drawFood() {
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.arc(food.x * tileSize + tileSize / 2, food.y * tileSize + tileSize / 2, tileSize / 2.2, 0, Math.PI * 2);
        ctx.fill();
      }

      function update() {
        if (!running) {
          return;
        }

        direction = nextDirection;
        const head = { ...snake[0] };
        head.x += direction.x;
        head.y += direction.y;

        const isEating = head.x === food.x && head.y === food.y;
        const collisionCheck = isEating ? snake : snake.slice(0, -1);

        if (
          head.x < 0 ||
          head.y < 0 ||
          head.x >= boardSize ||
          head.y >= boardSize ||
          walls.some((wall) => wall.x === head.x && wall.y === head.y) ||
          collisionCheck.some((segment) => segment.x === head.x && segment.y === head.y)
        ) {
          lives -= 1;
          livesEl.textContent = lives.toString();

          if (lives > 0) {
            snake = [
              { x: 10, y: 10 },
              { x: 9, y: 10 },
              { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            placeFood();
            return;
          }

          running = false;
          return;
        }

        snake.unshift(head);

        if (isEating) {
          score += 1;
          scoreEl.textContent = score.toString();
          placeFood();
        } else {
          snake.pop();
        }
      }

      function render() {
        drawBoard();
        drawWalls();
        drawFood();
        drawSnake();
      }

      function loop() {
        update();
        render();
        if (running) {
          gameLoop = requestAnimationFrame(loop);
        }
      }

      function setDirection(x, y) {
        if (x === -direction.x && y === -direction.y) {
          return;
        }
        nextDirection = { x, y };
      }

      document.addEventListener('keydown', (event) => {
        switch (event.key) {
          case 'ArrowUp':
            event.preventDefault();
            setDirection(0, -1);
            break;
          case 'ArrowDown':
            event.preventDefault();
            setDirection(0, 1);
            break;
          case 'ArrowLeft':
            event.preventDefault();
            setDirection(-1, 0);
            break;
          case 'ArrowRight':
            event.preventDefault();
            setDirection(1, 0);
            break;
          default:
            break;
        }
      });

      restartButton.addEventListener('click', () => {
        resetGame();
      });

      modeSelect.addEventListener('change', () => {
        resetGame();
      });

      difficultySelect.addEventListener('change', () => {
        resetGame();
      });

      resetGame();
    </script>
  </body>
</html>
